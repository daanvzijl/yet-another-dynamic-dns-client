name: Release

on:
  pull_request:
    types:
      - closed

jobs:
  release:
    if: github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'release:patch') || contains(github.event.pull_request.labels.*.name, 'release:minor') || contains(github.event.pull_request.labels.*.name, 'release:major'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          latest=$(git tag --sort=-v:refname | grep '^v' | head -n1)
          latest=${latest:-v0.0.0}
          major=$(echo $latest | cut -d. -f1 | tr -d v)
          minor=$(echo $latest | cut -d. -f2)
          patch=$(echo $latest | cut -d. -f3)

          if ${{ contains(github.event.pull_request.labels.*.name, 'release:major') }}; then
            major=$((major + 1)); minor=0; patch=0
          elif ${{ contains(github.event.pull_request.labels.*.name, 'release:minor') }}; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          echo "version=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT
          echo "tag=v${major}.${minor}.${patch}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - uses: jdx/mise-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
